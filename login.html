<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar sesión | Vuelve a Casa</title>

  <!-- Fuente moderna -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/login.css">
</head>
<body class="auth-bg">

  <div class="auth-wrapper">
    <div class="login-card">
      <img src="assets/logo.png" alt="Vuelve a Casa" class="logo">

      <h1 class="auth-title">Vuelve a Casa</h1>
      <p class="subtitle">Ingresa para ayudar a reunir familias</p>

      <form id="loginForm" class="auth-form">
        <div class="auth-group">
          <label for="cedula" class="auth-label">Cédula</label>
          <input
            type="text"
            id="cedula"
            class="auth-input"
            placeholder="Ingresa tu cédula"
            inputmode="numeric"
            autocomplete="username"
          >
        </div>

        <div class="auth-group">
          <label for="password" class="auth-label">Contraseña</label>
          <div class="password-field">
            <input
              type="password"
              id="password"
              class="auth-input auth-input--password"
              placeholder="••••••••"
            >
            <span id="togglePassword" class="toggle-eye">👁️</span>
          </div>
        </div>

        <div id="message" class="message"></div>

        <button type="submit" id="loginBtn" class="auth-btn-primary">
          Iniciar sesión
        </button>
      </form>

      <div class="extra">

        <a href="recover.html" class="auth-footer-link">¿Olvidaste tu contraseña?</a>
        <p class="register">
          ¿No tienes cuenta?
          <a href="index.html" class="auth-footer-link">Regístrate</a>
        </p>
      </div>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
